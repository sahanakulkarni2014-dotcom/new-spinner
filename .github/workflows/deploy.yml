name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

      - name: Create app directory on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "mkdir -p ~/spinner-app"

      - name: Copy files to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no index.html style.css script.js Dockerfile nginx.conf docker-compose.yml deploy.sh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/spinner-app/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "chmod +x ~/spinner-app/deploy.sh && cd ~/spinner-app && sudo bash deploy.sh"
