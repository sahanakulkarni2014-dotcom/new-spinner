name: 🚀 Deploy to EC2

on:
  push:
    branches:
      - main   # Trigger on every push to main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the code ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Write SSH key & configure SSH ─────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          # EC2_SSH_KEY must be in GitHub → Settings → Secrets → Actions
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

          # Skip interactive host verification (EC2_HOST is a Variable)
          cat >> ~/.ssh/config <<EOF
          Host ${{ vars.EC2_HOST }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      # ── 3. Copy project files to EC2 ─────────────────────
      # EC2_HOST and EC2_USER are GitHub → Settings → Variables → Actions
      - name: Copy files to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -r \
            index.html style.css script.js \
            Dockerfile nginx.conf docker-compose.yml deploy.sh \
            ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}:~/spinner-app/

      # ── 4. Run deploy.sh on EC2 ───────────────────────────
      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no \
            ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }} \
            "mkdir -p ~/spinner-app && chmod +x ~/spinner-app/deploy.sh && bash ~/spinner-app/deploy.sh"
