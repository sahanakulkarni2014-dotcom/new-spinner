name: 🚀 Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}

    steps:
      # ── 1. Checkout the code ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Write SSH key ──────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

      # ── 3. Copy project files to EC2 ─────────────────────
      - name: Copy files to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            index.html style.css script.js \
            Dockerfile nginx.conf docker-compose.yml deploy.sh \
            ${EC2_USER}@${EC2_HOST}:~/spinner-app/

      # ── 4. Run deploy.sh on EC2 ───────────────────────────
      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${EC2_USER}@${EC2_HOST} \
            "mkdir -p ~/spinner-app && chmod +x ~/spinner-app/deploy.sh && bash ~/spinner-app/deploy.sh"
